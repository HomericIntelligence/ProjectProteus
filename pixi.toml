[project]
name = "project-proteus"
version = "0.1.0"
description = "CI/CD pipeline automation hub for HomericIntelligence"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
just = ">=1.13"
python = ">=3.11"
jq = ">=1.7"
# skopeo is not available on conda-forge; install via system package manager:
#   sudo apt install skopeo  (Debian/Ubuntu)
#   brew install skopeo      (macOS)

[pypi-dependencies]
pyyaml = ">=6.0"
pydantic = ">=2.6"
pytest = ">=8"

[tasks]
build    = "just build {NAME}"
test     = "just test {NAME}"
promote  = "just promote {SRC} {DEST}"
lint     = "just lint"
bootstrap-proteus = "pip install -e ."
validate = "just validate"
pipeline = { cmd = "python -m proteus run configs/pipelines/{NAME}.yaml --service {NAME}", depends_on = ["bootstrap-proteus"] }
test-branch-protection = "bash tests/branch-protection.test.sh"
